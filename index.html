<!DOCTYPE html>
<html lang="no">
  <head>
    <title>Invoice App</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen font-sans">

    <!-- HEADER -->
    <header class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gray-800">Fakturaer</h1>
      <div class="flex gap-2">
        <button id="login-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
          Logg inn med Google
        </button>
        <button id="show-form-btn" style="display:none" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
          + Ny faktura
        </button>
        <button id="logout-btn" style="display:none" class="border border-gray-300 px-4 py-2 rounded hover:bg-gray-50 text-sm text-gray-700">
          Logg ut
        </button>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">

      <!-- LIST VIEW -->
      <div id="view-list">
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Mine fakturaer</h2>
        <div id="invoice-list" class="flex flex-col gap-3"></div>
      </div>

      <!-- FORM VIEW -->
      <div id="view-form" style="display:none">
        <h2 id="form-title" class="text-xl font-semibold text-gray-700 mb-4">Ny faktura</h2>
        <form id="invoice-form" class="bg-white rounded-xl shadow-sm p-6 flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label for="customer-name" class="text-sm font-medium text-gray-700">Kundenavn *</label>
            <input id="customer-name" placeholder="Firmanavn eller fullt navn" required
              class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="customer-orgnr" class="text-sm font-medium text-gray-700">Org.nr.</label>
            <input id="customer-orgnr" placeholder="123456789" maxlength="9"
              class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="customer-address" class="text-sm font-medium text-gray-700">Adresse</label>
            <input id="customer-address" placeholder="Gateadresse"
              class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="customer-city" class="text-sm font-medium text-gray-700">Postnr og sted</label>
            <input id="customer-city" placeholder="0000 Oslo"
              class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="customer-email" class="text-sm font-medium text-gray-700">E-post</label>
            <input id="customer-email" placeholder="kunde@eksempel.no" required
              class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
          </div>

          <div class="flex gap-2 items-center text-xs text-gray-500 font-medium px-1 mt-2">
            <span class="flex-1">Beskrivelse</span>
            <span class="w-16 text-right">Antall</span>
            <span class="w-24 text-right">Pris (kr)</span>
            <span class="w-16 text-right">MVA %</span>
            <span class="w-8"></span>
          </div>
          <div id="form-items" class="flex flex-col gap-2"></div>

          <div class="flex gap-2 flex-wrap">
            <button type="button" id="add-item"
              class="border border-gray-300 px-3 py-2 rounded hover:bg-gray-50 text-sm text-gray-700">
              + Legg til linje
            </button>
            <button type="submit"
              class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
              Lagre
            </button>
          </div>
        </form>
        <button id="back" class="mt-4 text-sm text-gray-500 hover:text-gray-800">← Tilbake</button>
      </div>

      <!-- DETAIL VIEW -->
      <div id="view-detail" style="display:none">
        <div class="flex gap-2 mb-4 flex-wrap items-center">
          <button id="back-detail" class="text-sm text-gray-500 hover:text-gray-800">← Tilbake</button>
          <button id="edit-invoice" style="display:none"
            class="bg-yellow-400 text-gray-900 px-4 py-2 rounded hover:bg-yellow-500 text-sm font-medium">
            Rediger
          </button>
          <div id="status-section" class="flex items-center gap-2 ml-auto"></div>
        </div>

        <!-- invoicePreview keeps inline styles — html2canvas relies on them for PDF -->
        <div id="invoicePreview"
          style="width:800px;padding:40px;font-family:Arial;background:white;color:#000;">
          <!-- HEADER -->
          <div style="display:flex;justify-content:space-between;margin-bottom:40px;">
            <div>
              <h2 style="margin:0">Ditt Firma AS</h2>
              <p style="margin:0">Org.nr: 123456789</p>
              <p style="margin:0">email@firma.no</p>
            </div>
            <div style="text-align:right">
              <h1 style="margin:0">FAKTURA</h1>
              <p id="inv-number"></p>
              <p id="inv-date"></p>
            </div>
          </div>
          <!-- KUNDE -->
          <div style="margin-bottom:30px">
            <h3>Kunde</h3>
            <div id="customer"></div>
          </div>
          <!-- TABELL -->
          <table style="width:100%;border-collapse:collapse;margin-bottom:30px">
            <thead>
              <tr style="border-bottom:2px solid #000">
                <th style="text-align:left">Beskrivelse</th>
                <th>Antall</th>
                <th>Pris</th>
                <th>MVA %</th>
                <th>Sum</th>
              </tr>
            </thead>
            <tbody id="items"></tbody>
          </table>
          <!-- TOTAL -->
          <div style="text-align:right">
            <p>Subtotal: <span id="subtotal"></span> kr</p>
            <p>MVA: <span id="vat"></span> kr</p>
            <h2>Total: <span id="total"></span> kr</h2>
          </div>
        </div>

        <div class="flex gap-2 mt-4 flex-wrap">
          <button id="download-pdf"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
            Last ned PDF
          </button>
          <button id="send-email"
            class="border border-gray-300 px-4 py-2 rounded hover:bg-gray-50 text-sm text-gray-700">
            Send på e-post
          </button>
        </div>
      </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
