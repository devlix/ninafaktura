<!DOCTYPE html>
<html>
  <head>
    <title>Invoice App</title>
    <link rel="manifest" href="manifest.json" />
  </head>

  <body>
    <h1>Invoices</h1>

    <button id="login">Login with Google</button>
    <button id="show-form">Add invoice</button>

    <!-- LIST VIEW -->
    <div id="view-list">
      <h2>Dine fakturaer</h2>
      <div id="invoice-list"></div>
    </div>

    <!-- FORM VIEW -->
    <div id="view-form" style="display: none">
      <h2>Ny faktura</h2>

      <form id="invoice-form">
        <input id="customer-name" placeholder="Kundenavn" required />
        <input id="customer-email" placeholder="E-post" required />

        <div id="items"></div>

        <button type="button" id="add-item">+ Legg til linje</button>
        <button type="submit">Lagre</button>
      </form>

      <button id="back">← Tilbake</button>
    </div>

    <!-- PREVIEW -->
    <div id="invoice-preview">
      <!-- Template for Faktura -->
      <h2>Faktura preview</h2>
      <div id="invoice-template"></div>
    </div>

    <div
      id="invoice"
      style="
        width: 800px;
        padding: 40px;
        font-family: Arial;
        background: white;
        color: #000;
      "
    >
      <!-- HEADER -->
      <div
        style="
          display: flex;
          justify-content: space-between;
          margin-bottom: 40px;
        "
      >
        <div>
          <h2 style="margin: 0">Ditt Firma AS</h2>
          <p style="margin: 0">Org.nr: 123456789</p>
          <p style="margin: 0">email@firma.no</p>
        </div>

        <div style="text-align: right">
          <h1 style="margin: 0">FAKTURA</h1>
          <p id="inv-number"></p>
          <p id="inv-date"></p>
        </div>
      </div>

      <!-- KUNDE -->
      <div style="margin-bottom: 30px">
        <h3>Kunde</h3>
        <div id="customer"></div>
      </div>

      <!-- TABELL -->
      <table
        style="width: 100%; border-collapse: collapse; margin-bottom: 30px"
      >
        <thead>
          <tr style="border-bottom: 2px solid #000">
            <th style="text-align: left">Beskrivelse</th>
            <th>Antall</th>
            <th>Pris</th>
            <th>MVA</th>
            <th>Sum</th>
          </tr>
        </thead>
        <tbody id="items"></tbody>
      </table>

      <!-- TOTAL -->
      <div style="text-align: right">
        <p>Subtotal: <span id="subtotal"></span> kr</p>
        <p>MVA: <span id="vat"></span> kr</p>
        <h2>Total: <span id="total"></span> kr</h2>
      </div>
    </div>

    <button id="sendEmail">Last ned & send faktura</button>

    <!-- listing av fakturaer - KUN UNDER DEVELOPMENT -->
    <pre id="output"></pre>
    <pre id="output"></pre>

    <!-- TODO Dette må sikres med hashene til de eksplisitte libarries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
